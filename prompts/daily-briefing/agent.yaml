name: daily-briefing
model: claude-sonnet-4-6

cron:
  schedule: "0 5 * * *"
  timezone: America/Denver

runner:
  maxTokens: 8192
  maxTurns: 50
  turnDelay: 15
  toolResultMaxChars: 3000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

memory:
  enabled: true
  size: 500Mi
  nfsServer: soma.bhavana.local
  nfsPath: /kube-volumes/agent-daily-briefing-1

mcpServers:
  home-assistant:
    url: "http://192.168.1.55:8086/mcp"
    transport: streamable_http
    tools:
      - ha_get_overview
      - ha_get_bulk_status
      - ha_get_entity
      - ha_search_entities
      - ha_get_history
  gmail:
    url: "http://gmail-mcp.agents.svc.cluster.local:3000/sse"
  google-calendar:
    url: "http://gcal-mcp.agents.svc.cluster.local:3001/sse"
  mac-bridge:
    url: "http://mac-bridge.agents.svc.cluster.local:4000/sse"

secrets:
  - envVar: BRIEFING_EMAIL
    secretName: briefing-config
    secretKey: email
