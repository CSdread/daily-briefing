apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcal-mcp
  namespace: agents
  labels:
    app: gcal-mcp
    type: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gcal-mcp
  template:
    metadata:
      labels:
        app: gcal-mcp
        type: mcp-server
    spec:
      containers:
        - name: gcal-mcp
          image: csdread/gcal-mcp:1
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: sse
          env:
            - name: PORT
              value: "3001"
            - name: TZ
              value: America/Denver
          volumeMounts:
            - name: oauth-credentials
              mountPath: /oauth
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: oauth-credentials
          secret:
            secretName: gcal-oauth
