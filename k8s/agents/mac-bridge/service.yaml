apiVersion: v1
kind: Service
metadata:
  name: mac-bridge
  namespace: agents
  labels:
    app: mac-bridge
spec:
  # Headless service with manual Endpoints — used when mac-bridge runs
  # natively on a machine outside the cluster (e.g. laptop, Mac mini).
  # Update the IP in endpoints.yaml to match the host machine's address.
  #
  # --- Containerized mode (k8s Deployment on a Mac node) ---
  # When running via deployment.yaml, replace this with a ClusterIP service:
  #
  # spec:
  #   type: ClusterIP
  #   selector:
  #     app: mac-bridge
  #   ports:
  #     - port: 4000
  #       targetPort: 4000
  #       name: sse
  #
  # Either way the in-cluster DNS name stays the same:
  #   http://mac-bridge.agents.svc.cluster.local:4000/sse
  clusterIP: None
  ports:
    - port: 4000
      targetPort: 4000
      name: sse
