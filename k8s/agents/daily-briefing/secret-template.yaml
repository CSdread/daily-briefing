# Secret Template — DO NOT COMMIT REAL VALUES
#
# This file documents required secrets. Create them with kubectl:
#
# kubectl create secret generic anthropic-api-key \
#   --from-literal=key=sk-ant-api03-... \
#   -n agents
#
# kubectl create secret generic briefing-config \
#   --from-literal=email=your@email.com \
#   -n agents
#
# kubectl create secret generic gmail-oauth \
#   --from-file=credentials.json=./credentials.json \
#   --from-file=token.json=./token.json \
#   -n agents
#
# kubectl create secret generic gcal-oauth \
#   --from-file=credentials.json=./credentials.json \
#   --from-file=token.json=./gcal-token.json \
#   -n agents
#
# See docs/secrets.md for full instructions.

# Required secrets for daily-briefing CronJob:
#
# Secret Name          | Key                  | Description
# ---------------------|----------------------|----------------------------
# anthropic-api-key    | key                  | Anthropic API key
# briefing-config      | email                | Destination email address
#
# Required secrets for Gmail MCP deployment:
#
# Secret Name          | Key                  | Description
# ---------------------|----------------------|----------------------------
# gmail-oauth          | credentials.json     | Google OAuth2 client credentials
# gmail-oauth          | token.json           | Google OAuth2 access/refresh token
#
# Required secrets for Google Calendar MCP deployment:
#
# Secret Name          | Key                  | Description
# ---------------------|----------------------|----------------------------
# gcal-oauth           | credentials.json     | Google OAuth2 client credentials
# gcal-oauth           | token.json           | Google OAuth2 access/refresh token
