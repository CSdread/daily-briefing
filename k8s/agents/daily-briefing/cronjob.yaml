apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-briefing
  namespace: agents
  labels:
    app: daily-briefing
    type: agent
spec:
  # 5:00 AM Mountain Time daily
  schedule: "0 5 * * *"
  timeZone: "America/Denver"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Hard 30-minute timeout — prevents runaway agentic loops
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: daily-briefing
            type: agent-job
        spec:
          serviceAccountName: agent-runner
          restartPolicy: Never
          containers:
            - name: agent-runner
              image: csdread/agent-runner:4
              imagePullPolicy: Always
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: anthropic-api-key
                      key: key
                - name: BRIEFING_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: briefing-config
                      key: email
                - name: AGENT_MD_PATH
                  value: /config/AGENT.md
                - name: MCP_CONFIG_PATH
                  value: /config/mcp.json
                - name: CLAUDE_MODEL
                  value: claude-sonnet-4-6
                - name: MAX_TOKENS
                  value: "8192"
                - name: MAX_TURNS
                  value: "50"
                - name: TURN_DELAY
                  value: "15"
                - name: TOOL_RESULT_MAX_CHARS
                  value: "3000"
                - name: TZ
                  value: America/Denver
              volumeMounts:
                - name: agent-config
                  mountPath: /config
                  readOnly: true
                - name: agent-memory
                  mountPath: /memory
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: agent-config
              configMap:
                name: daily-briefing-config
            - name: agent-memory
              persistentVolumeClaim:
                claimName: agent-daily-briefing-1
